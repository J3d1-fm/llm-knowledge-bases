<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Authenticated LLM Knowledge Bases workspace demo with compiled wiki content, source coverage, health checks, and outputs.">
    <meta name="theme-color" content="#0f191a">
    <title>Workspace | LLM Knowledge Bases</title>
    <link rel="stylesheet" href="styles.css">
    <script src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
  </head>
  <body class="app-body">
    <a class="skip-link" href="#workspace">Skip to workspace</a>

    <header class="app-topbar" aria-label="Workspace">
      <a class="brand" href="index.html" aria-label="Back to LLM Knowledge Bases home">
        <span class="brand-mark" aria-hidden="true">KB</span>
        <span>LLM Knowledge Bases</span>
      </a>
      <div class="app-session">
        <p class="auth-note" id="authNote" aria-live="polite"></p>
        <button class="sign-in-button" id="signInButton" type="button">Sign in with Google</button>
        <span class="session-pill" id="sessionState" hidden></span>
        <button class="text-button" id="signOutButton" type="button" hidden>Sign out</button>
      </div>
    </header>

    <main id="workspace">
      <section class="auth-gate" id="authGate" aria-label="Private workspace"></section>

      <section class="knowledge-shell" id="knowledgeShell" hidden>
        <aside class="kb-sidebar" aria-label="Workspace navigation">
          <div class="kb-context">
            <p class="eyebrow">Vault snapshot</p>
            <h2 id="vaultTitle">Research Wiki</h2>
            <p id="vaultSummary"></p>
          </div>
          <label class="search-label" for="kbSearch">Search</label>
          <input class="kb-search" id="kbSearch" type="search" placeholder="Find articles, projects, tags, checks">
          <nav class="kb-nav" aria-label="Knowledge views">
            <button class="kb-nav-button is-active" type="button" data-view="workdb">Work DB</button>
            <button class="kb-nav-button" type="button" data-view="articles">Articles</button>
            <button class="kb-nav-button" type="button" data-view="sources">Sources</button>
            <button class="kb-nav-button" type="button" data-view="checks">Health checks</button>
            <button class="kb-nav-button" type="button" data-view="outputs">Outputs</button>
          </nav>
        </aside>

        <section class="kb-main" aria-live="polite">
          <section class="workdb-map" aria-label="Work DB graph explorer">
            <div class="workdb-map-header">
              <div class="workdb-map-meta">
                <p class="eyebrow">Work graph</p>
                <strong id="workdbMapStats">Loading map</strong>
              </div>
              <div class="workdb-map-toolbar" aria-label="Graph controls">
                <button class="graph-control" type="button" data-workdb-graph-action="zoom-out" aria-label="Zoom out">-</button>
                <span class="graph-zoom-state" id="workdbZoomState">100%</span>
                <button class="graph-control" type="button" data-workdb-graph-action="zoom-in" aria-label="Zoom in">+</button>
                <button class="graph-control text-control" type="button" data-workdb-graph-action="fit">Fit all</button>
                <button class="graph-control text-control" type="button" data-workdb-graph-action="reset">1:1</button>
                <button class="graph-control text-control" type="button" data-workdb-graph-action="expand" aria-pressed="false">Expand</button>
              </div>
            </div>
            <div class="workdb-map-stage">
              <canvas class="workdb-map-canvas" id="workdbSnapshot" tabindex="0" role="button" aria-label="Interactive Work DB graph. Drag to pan. Use graph controls or mouse wheel to zoom. Use arrow keys to move between records, then press Enter to open."></canvas>
              <aside class="workdb-map-inspector" id="workdbMapInspector" aria-live="polite" hidden>
                <p class="eyebrow" id="workdbMapInspectorMeta">Selected node</p>
                <strong id="workdbMapInspectorTitle">Select a node</strong>
                <span id="workdbMapInspectorBody">Click a visible dot to open its Work DB record.</span>
                <button class="mini-action" id="workdbMapInspectorAction" type="button">Open record</button>
              </aside>
            </div>
          </section>

          <div class="kb-summary-grid" id="summaryGrid"></div>
          <div class="cloud-status-grid" id="cloudStatus" aria-label="Cloud database status"></div>

          <div class="kb-workbench">
            <section class="kb-list-panel" aria-label="Knowledge items">
              <div class="panel-heading">
                <p class="eyebrow" id="listEyebrow">Articles</p>
                <h2 id="listTitle">Compiled wiki</h2>
              </div>
              <div class="kb-list" id="kbList"></div>
            </section>

            <article class="kb-detail-panel" id="detailPanel" aria-label="Selected item"></article>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
